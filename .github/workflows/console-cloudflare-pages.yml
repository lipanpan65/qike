name: Deploy Console to Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy console
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    defaults:
      run:
        working-directory: console

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Create Cloudflare Pages project if missing
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          PROJECT_NAME="qike-console"

          if npx wrangler@latest pages project list --json | jq -e --arg name "$PROJECT_NAME" '.[] | select(.name == $name)' >/dev/null; then
            echo "Cloudflare Pages project $PROJECT_NAME already exists. Skipping create."
          else
            echo "Creating Cloudflare Pages project $PROJECT_NAME."

            if ! create_output=$(npx wrangler@latest pages project create "$PROJECT_NAME" --production-branch=master 2>&1); then
              echo "$create_output"

              if echo "$create_output" | grep -q "A project with this name already exists"; then
                echo "Cloudflare Pages project $PROJECT_NAME already exists. Continuing."
              else
                exit 1
              fi
            fi
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PROJECT_NAME: qike-console
        run: npx wrangler@latest pages deploy dist --project-name="$PROJECT_NAME" --branch=master --commit-dirty=true
